<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Buttons CSS</title>
  </head>
  <body>
    <h2>Normal buttons</h2>
    <a class="button outline" href="">Learn More</a>
    <button class="button outline">Learn More</button>
    <button class="button outline hover">Learn More</button>

    <h2>Filled Buttons</h2>
    <a class="button fill" href="">Learn More</a>
    <button class="button fill">Learn More</button>
    <button class="button fill hover">Learn More</button>

    <h2>Icon Buttons</h2>
    <a class="icon button fill" href="">Learn More</a>
    <button class="icon button fill">Learn More</button>
    <button class="icon button fill hover">Learn More</button>
  </body>
</html>
